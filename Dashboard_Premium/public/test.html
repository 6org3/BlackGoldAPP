<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Black Gold - Test Funcional Supabase</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #ccc; padding: 40px; }
    h1 { color: #FFD700; }
    .test { padding: 10px 0; border-bottom: 1px solid #222; }
    .pass { color: #34d399; }
    .fail { color: #ef4444; }
    .info { color: #a3a3a3; font-size: 12px; }
    .result { margin-top: 30px; padding: 20px; border-radius: 12px; }
    .result.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); }
    .result.failure { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
    #log { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>⚡ Black Gold — Test Funcional</h1>
  <p class="info">Verificando conexión Supabase y operaciones CRUD...</p>
  <hr style="border-color: #333;">
  <div id="log"></div>
  <div id="result"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rpacqduboxkhetdlcgxb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwYWNxZHVib3hraGV0ZGxjZ3hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Nzg2NTIsImV4cCI6MjA5NjE1NDY1Mn0.wlBiWaTnaWOGPIRxUAZCFwineLG4Nv5Lz6oghbZ_cWA';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const log = document.getElementById('log');
    const resultDiv = document.getElementById('result');
    let passed = 0;
    let failed = 0;

    function logTest(name, success, detail = '') {
      const icon = success ? '✅' : '❌';
      const cls = success ? 'pass' : 'fail';
      if (success) passed++; else failed++;
      log.innerHTML += `<div class="test"><span class="${cls}">${icon} ${name}</span>${detail ? `<br><span class="info">   → ${detail}</span>` : ''}</div>`;
    }

    async function runTests() {
      log.innerHTML += '<div class="info">Iniciando tests...\n</div>';

      // Test 1: Conexión a Supabase
      try {
        const { data, error } = await supabase.from('usuarios').select('count', { count: 'exact', head: true });
        logTest('Conexión a Supabase', !error, error ? error.message : 'Conexión exitosa');
      } catch (e) {
        logTest('Conexión a Supabase', false, e.message);
      }

      // Test 2: Lectura de Usuarios
      try {
        const { data, error } = await supabase.from('usuarios').select('*');
        logTest('Lectura tabla "usuarios"', !error && data.length > 0, `${data?.length || 0} usuarios encontrados`);
      } catch (e) {
        logTest('Lectura tabla "usuarios"', false, e.message);
      }

      // Test 3: Lectura de Atletas
      try {
        const { data, error } = await supabase.from('atletas').select('*, usuarios!inner(nombre, cedula)');
        logTest('Lectura tabla "atletas" (con JOIN)', !error && data.length > 0, `${data?.length || 0} atletas con datos de usuario`);
      } catch (e) {
        logTest('Lectura tabla "atletas"', false, e.message);
      }

      // Test 4: Lectura de Misiones
      try {
        const { data, error } = await supabase.from('misiones').select('*');
        logTest('Lectura tabla "misiones"', !error && data.length > 0, `${data?.length || 0} misiones educativas`);
      } catch (e) {
        logTest('Lectura tabla "misiones"', false, e.message);
      }

      // Test 5: Lectura de Progreso
      try {
        const { data, error } = await supabase.from('progreso_misiones').select('*, misiones(titulo)');
        logTest('Lectura tabla "progreso_misiones" (con JOIN)', !error && data.length > 0, `${data?.length || 0} asignaciones`);
      } catch (e) {
        logTest('Lectura tabla "progreso_misiones"', false, e.message);
      }

      // Test 6: Login simulado (buscar por cédula)
      try {
        const { data, error } = await supabase.from('usuarios').select('*').eq('cedula', '4444444444').single();
        logTest('Login por cédula (Zoro: 4444444444)', !error && data?.nombre === 'Zoro', `Usuario: ${data?.nombre}, Rol: ${data?.rol}`);
      } catch (e) {
        logTest('Login por cédula', false, e.message);
      }

      // Test 7: Crear y eliminar atleta de prueba (CRUD)
      let testUserId = null;
      try {
        const { data: newUser, error: insertErr } = await supabase
          .from('usuarios')
          .insert({ cedula: '9999999999', nombre: 'Test_Bot', rol: 'atleta', club: 'Test', categoria: 'Sub18' })
          .select().single();

        if (insertErr) throw insertErr;
        testUserId = newUser.id;

        const { error: atlErr } = await supabase
          .from('atletas')
          .insert({ usuario_id: newUser.id, edad: 15, posicion: 'Generador', fuerza: 50, explosividad: 50, flexibilidad: 50, eficiencia_tactica: 50, resiliencia_psicologica: 50, nutricion: 50, hidratacion: 50 });

        if (atlErr) throw atlErr;
        logTest('CRUD: Crear atleta de prueba', true, `ID: ${newUser.id}`);
      } catch (e) {
        logTest('CRUD: Crear atleta de prueba', false, e.message);
      }

      // Test 8: Eliminar atleta de prueba
      if (testUserId) {
        try {
          await supabase.from('atletas').delete().eq('usuario_id', testUserId);
          await supabase.from('usuarios').delete().eq('id', testUserId);
          logTest('CRUD: Eliminar atleta de prueba', true, 'Limpieza exitosa');
        } catch (e) {
          logTest('CRUD: Eliminar atleta de prueba', false, e.message);
        }
      }

      // Test 9: Quiz data integrity
      try {
        const { data, error } = await supabase.from('misiones').select('titulo, quiz').not('quiz', 'is', null);
        const withQuiz = data?.filter(m => Array.isArray(m.quiz) && m.quiz.length > 0) || [];
        logTest('Integridad de Quiz (JSONB)', !error && withQuiz.length > 0, `${withQuiz.length} misiones con cuestionario válido`);
      } catch (e) {
        logTest('Integridad de Quiz', false, e.message);
      }

      // Resultado final
      const total = passed + failed;
      const allPassed = failed === 0;
      resultDiv.innerHTML = `
        <div class="result ${allPassed ? 'success' : 'failure'}">
          <h2 style="color: ${allPassed ? '#34d399' : '#ef4444'}; margin: 0;">
            ${allPassed ? '🏆 TODOS LOS TESTS PASARON' : `⚠️ ${failed} TEST(S) FALLARON`}
          </h2>
          <p style="margin: 10px 0 0; color: #aaa;">${passed}/${total} exitosos · Supabase: rpacqduboxkhetdlcgxb</p>
        </div>
      `;
    }

    runTests();
  </script>
</body>
</html>
